version: "3.9"

services:

  # =========================
  # API (.NET)
  # =========================
  api:
    image: ghcr.io/dar3kdev/uni-chat-backend:latest
    container_name: uni-chat-api
    restart: unless-stopped

    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://0.0.0.0:8080

      ENABLE_DOCS: ${ENABLE_DOCS}

      Mongo__ConnectionString: ${MONGO_CONNECTION_STRING}
      Mongo__Database: ${MONGO_DATABASE}

      Redis__ConnectionString: redis:6379

      RabbitMQ__User: ${RABBITMQ_USER}
      RabbitMQ__Pass: ${RABBITMQ_PASS}
      RabbitMQ__ConnectionString: amqp://${RABBITMQ_USER}:${RABBITMQ_PASS}@rabbitmq:5672

      Jwt__Key: ${JWT_KEY}
      Jwt__Issuer: ${JWT_ISSUER}
      Jwt__Audience: ${JWT_AUDIENCE}
      Jwt__ExpireMinutes: ${JWT_EXPIRE_MINUTES}

      Refresh__ExpireDays: ${REFRESH_EXPIRE_DAYS}

      Cloudinary__CloudName: ${CLOUDINARY_CLOUD_NAME}
      Cloudinary__ApiKey: ${CLOUDINARY_API_KEY}
      Cloudinary__ApiSecret: ${CLOUDINARY_API_SECRET}

    depends_on:
      - mongodb
      - redis
      - rabbitmq

    networks:
      - backend

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3


  nginx:
    image: nginx:alpine
    container_name: uni-chat-nginx
    restart: unless-stopped

    ports:
      - "80:80"

    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf

    depends_on:
      - api

    networks:
      - backend

  mongodb:
    image: mongo:8
    container_name: mongodb
    restart: unless-stopped

    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}

    volumes:
      - mongo_data:/data/db

    networks:
      - backend

  redis:
    image: redis:8-alpine
    container_name: redis
    restart: unless-stopped

    networks:
      - backend

  rabbitmq:
    image: rabbitmq:4-management
    container_name: rabbitmq
    restart: unless-stopped

    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS}

    ports:
      - "5672:5672"
      - "15672:15672"
      
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

    networks:
      - backend

  seq:
    image: datalust/seq:latest
    container_name: seq
    restart: unless-stopped

    environment:
      ACCEPT_EULA: Y
      SEQ_FIRSTRUN_ADMINUSERNAME: ${SEQ_ADMIN}
      SEQ_FIRSTRUN_ADMINPASSWORD: ${SEQ_ADMIN_PASSWORD}

    volumes:
      - seq_data:/data

    ports:
      - "8083:80"
      - "5341:5341"

    networks:
      - backend


networks:
  backend:
    driver: bridge

volumes:
  mongo_data:
  rabbitmq_data:
  seq_data: